<!DOCTYPE html>
<html lang="pt-br">
<head>

    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <main>
        <h1>Quem está assistindo?</h1>

                    <img src="/assets/alex.jpg" alt="Foto de perfil de Alex Pereira, lutador com cinturão de campeão.">
                    <figcaption>Alex Pereira</figcaption>
                </figure>
            </article> <article class="profile">
                <figure>
                    <img src="/assets/charles.jpg" alt="Foto de perfil de Charles do Bronx, atleta em posição de luta.">
                    <figcaption>Charles do Bronx</figcaption>
                </figure>
            </article>
            <article class="profile">
                <figure>
                    <img src="/assets/connor.jpg" alt="Foto de perfil de Connor Mc Gregor, lutador profissional.">
                    <figcaption>Connor Mc Gregor</figcaption>
                </figure>
            </article>
            <article class="profile">
                <figure>
                    <img src="/assets/khabib.webp" alt="Foto de perfil de Khabib Nurmagumedov, campeão de MMA.">
                    <figcaption>Khabib Nurmagumedov</figcaption>
                </figure>

        <button class="btn-gerenciar">Gerenciar perfis</button>
